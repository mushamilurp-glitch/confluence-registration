<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Registration Successful</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#22003d,#3c0075,#2b0052);
      font-family:'Poppins',sans-serif;
      color:white;
      padding:20px;
    }

    .success-card{

      width:100%;
      max-width:520px;

      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.15);

      backdrop-filter:blur(15px);

      border-radius:30px;

      padding:50px 35px;

      text-align:center;

      box-shadow:0 10px 40px rgba(0,0,0,0.35);

    }

    .tick{
      font-size:70px;
      margin-bottom:20px;
    }

    h1{
      font-family:'Montserrat',sans-serif;
      font-size:34px;
      margin-bottom:20px;
    }

    p{
      font-size:18px;
      line-height:1.8;
      opacity:0.92;
    }

    .whatsapp-btn{

      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;

      width:100%;

      margin-top:35px;

      padding:16px 24px;

      background:white;

      color:#25D366;

      text-decoration:none;

      border-radius:16px;

      font-weight:700;

      font-size:17px;

      transition:0.3s;
    }

    .whatsapp-btn:hover{
      transform:translateY(-2px);
    }

    .whatsapp-icon{
      font-size:24px;
    }

    @media(max-width:768px){

      .success-card{
        padding:35px 22px;
        border-radius:24px;
      }

      h1{
        font-size:28px;
      }

      p{
        font-size:15px;
        line-height:1.7;
      }

      .whatsapp-btn{
        font-size:15px;
        padding:15px 18px;
      }

      .whatsapp-icon{
        font-size:22px;
      }

    }

  </style>

</head>

<body>

  <div class="success-card">

    <div class="tick">🎉</div>

    <h1>Registration Successful</h1>

    <p>
      Thank You for registering for CONFLUENCE '26 — an evening of vision, reflection and meaningful conversations.
    </p>

    <p style="margin-top:12px;">
      Kindly join the official WhatsApp group below to stay updated with announcements, schedules and important event communications.
    </p>

    <a
      href="https://chat.whatsapp.com/I4ll0o4P0zCI8mbBpyIZdx"
      target="_blank"
      class="whatsapp-btn"
    >
      <span class="whatsapp-icon">🟢</span>
      Join WhatsApp Group
    </a>

  </div>

</body>
</html>
