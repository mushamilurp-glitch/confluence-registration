<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Registration Successful</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#22003d,#3c0075,#2b0052);
      font-family:'Poppins',sans-serif;
      color:white;
      overflow:hidden;
      padding:20px;
    }

    .success-card{

      width:100%;
      max-width:500px;

      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.15);

      backdrop-filter:blur(15px);

      border-radius:30px;

      padding:50px 35px;

      text-align:center;

      box-shadow:0 10px 40px rgba(0,0,0,0.35);

    }

    .tick{
      font-size:70px;
      margin-bottom:20px;
    }

    h1{
      font-family:'Montserrat',sans-serif;
      font-size:34px;
      margin-bottom:20px;
    }

    p{
      font-size:18px;
      line-height:1.8;
      opacity:0.9;
    }

    .whatsapp-btn{

      display:inline-block;

      margin-top:35px;

      padding:16px 28px;

      background:white;

      color:#4b0082;

      text-decoration:none;

      border-radius:14px;

      font-weight:700;

      transition:0.3s;
    }

    .whatsapp-btn:hover{
      transform:translateY(-2px);
    }

  </style>

</head>

<body>

  <div class="success-card">

    <div class="tick">✅</div>

    <h1>Registration Successful</h1>

    <p>
      Thank You for registering to this event.
    </p>

    <p style="margin-top:10px;">
      For more updates, join our WhatsApp group.
    </p>

    <a
      href="PASTE_WHATSAPP_GROUP_LINK_HERE"
      target="_blank"
      class="whatsapp-btn"
    >
      Join WhatsApp Group
    </a>

  </div>

</body>
</html>
